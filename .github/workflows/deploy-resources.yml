name: Deploy Resources
on:
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region for resource deployment (e.g. germanywestcentral,
          eastus, westeurope)"
        required: false
        default: "germanywestcentral"
      environment:
        description: "Deployment environment that defines your secrets (e.g. prod, staging)"
        required: false
        default: "prod"
      domainName:
        description: "Domain name to configure (e.g. contoso.com)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' }} # Safeguard to ensure this job only runs on manual trigger
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Azure CLI
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create App Registration for Nextcloud
        id: create_app
        run: |
          appId=$(az ad app create --display-name "NextcloudApp" --query appId -o tsv)
          echo "appId=$appId" >> $GITHUB_OUTPUT

      - name: Create Client Secret for App Registration
        id: create_secret
        run: |
          set -euo pipefail
          appId="${{ steps.create_app.outputs.appId }}"
          # wait for app registration to propagate
          tries=12
          found=false
          for i in $(seq 1 $tries); do
            if az ad app show --id "$appId" >/dev/null 2>&1; then
              echo "App found after $i attempt(s)"
              found=true
              break
            fi
            echo "Waiting for app registration to appear ($i/$tries)..."
            sleep 5
          done
          if [ "$found" = false ]; then
            echo "App registration not found after $tries attempts"
            exit 1
          fi
          secretTries=5
          for j in $(seq 1 $secretTries); do
            clientSecret=$(az ad app credential reset --id "$appId" --append --display-name "default" --years 2 --query password -o tsv 2>/dev/null || true)
            if [ -n "$clientSecret" ]; then
              echo "Client secret created after $j attempt(s)"
              echo "clientSecret=$clientSecret" >> $GITHUB_OUTPUT
              break
            fi
            echo "Waiting for client secret to be created ($j/$secretTries)..."
            sleep 5
          done
          if [ -z "$clientSecret" ]; then
            echo "Failed to create client secret after $secretTries attempts"
            exit 1
          fi

      - name: Generate SSH Key Pair
        id: generate_ssh
        run: |
          ssh-keygen -t rsa -b 2048 -f ssh_key -N ""
          # Base64-encode keys to produce single-line outputs safe for passing
          base64 -w0 ssh_key > ssh_key.b64
          base64 -w0 ssh_key.pub > ssh_key_pub.b64
          echo "sshKeyDataPrivateB64=$(cat ssh_key.b64)" >> $GITHUB_OUTPUT
          echo "sshKeyDataPublicB64=$(cat ssh_key_pub.b64)" >> $GITHUB_OUTPUT

      - name: Generate Random Passwords
        id: generate_passwords
        run: |
          dbPassword=$(openssl rand -base64 32)
          adminPassword=$(openssl rand -base64 32)
          redisPassword=$(openssl rand -base64 32)
          echo "dbPassword=$dbPassword" >> $GITHUB_OUTPUT
          echo "adminPassword=$adminPassword" >> $GITHUB_OUTPUT
          echo "redisPassword=$redisPassword" >> $GITHUB_OUTPUT

      - name: Deploy Azure Resources
        run: |
          cd cloud-init
          chmod +x deploy.sh
          SSH_PRIVATE_B64="${{ steps.generate_ssh.outputs.sshKeyDataPrivateB64 }}"
          SSH_PUBLIC_B64="${{ steps.generate_ssh.outputs.sshKeyDataPublicB64 }}"
          # decode base64 into variables preserving newlines for the script
          SSH_PRIVATE=$(printf '%s' "$SSH_PRIVATE_B64" | base64 --decode)
          SSH_PUBLIC=$(printf '%s' "$SSH_PUBLIC_B64" | base64 --decode)
          DB_PW="${{ steps.generate_passwords.outputs.dbPassword }}"
          ADMIN_PW="${{ steps.generate_passwords.outputs.adminPassword }}"
          REDIS_PW="${{ steps.generate_passwords.outputs.redisPassword }}"
          CLIENT_ID="${{ steps.create_app.outputs.appId }}"
          CLIENT_SECRET="${{ steps.create_secret.outputs.clientSecret }}"
            DOMAIN_NAME="${{ github.event.inputs.domainName }}"

          ./deploy.sh \
            --location "${{ github.event.inputs.location }}" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --ssh-private "$SSH_PRIVATE" \
            --ssh-public "$SSH_PUBLIC" \
            --db-password "$DB_PW" \
            --admin-password "$ADMIN_PW" \
            --redis-password "$REDIS_PW"
              --domainName "$DOMAIN_NAME"
