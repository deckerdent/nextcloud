services:
  # 1. SSL & Nginx Proxy (SWAG)
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${SWAG_TIMEZONE}
      - URL=${PRIMARY_DOMAIN}
      - SUBDOMAINS=${SWAG_SUBDOMAINS}
      - VALIDATION=${SWAG_VALIDATION}
      - DNSPLUGIN=${SWAG_DNSPLUGIN}
      - EMAIL=${SWAG_EMAIL}
      - STAGING=${SWAG_STAGING:-false}
    volumes:
      - ./config/swag/config/:/config
    ports:
      - 443:443
    restart: unless-stopped

  # 2. Nextcloud Application (PHP-FPM)
  app:
    image: nextcloud:apache
    container_name: nextcloud
    restart: unless-stopped
    expose:
      - "9000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Database Auto-Config
      - POSTGRES_HOST=${NEXTCLOUD_DB_HOST}
      - POSTGRES_DB=${NEXTCLOUD_DB}
      - POSTGRES_USER=${NEXTCLOUD_DB_USER}
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      # Nextcloud Initialization
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      # Redis Cache Config
      - REDIS_HOST=${NEXTCLOUD_REDIS_HOST}
      - REDIS_HOST_PASSWORD=${NEXTCLOUD_REDIS_PASSWORD}
      # Proxy & Domain Settings
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - TRUSTED_PROXIES=${NEXTCLOUD_TRUSTED_PROXIES}
      - OVERWRITEPROTOCOL=${NEXTCLOUD_OVERWRITEPROTOCOL}
      - OVERWRITECLIURL=https://${PRIMARY_DOMAIN}
      - NEXTCLOUD_UPDATE=1
    volumes:
      # We ONLY persist the unique parts. Code stays in the image.
      - ./config/nextcloud/config:/var/www/html/config
      - ./nextcloud-data:/var/www/html/data
      - ./config/nextcloud/custom_apps:/var/www/html/custom_apps
    depends_on:
      - db
      - redis

  # 3. Database (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    expose:
      - "5432"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_DB=${NEXTCLOUD_DB}
      - POSTGRES_USER=${NEXTCLOUD_DB_USER}
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - ./db-data:/var/lib/postgresql/data

  # 4. Cache (Redis)
  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${NEXTCLOUD_REDIS_PASSWORD}"]
    expose:
      - "6379"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"